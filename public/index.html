<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5071542360049001"
     crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
      --border: #2a2a2a; --text: #f0ede6; --muted: #888;
      --accent: #1C9AFD; --accent-dark: #1482D9;
      --fake: #ff5c5c; --suspicious: #ffb347; --real: #5cffa0;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 3rem 1.5rem;
    }
    header { text-align: center; margin-bottom: 3rem; animation: fadeUp 0.6s ease both; }
    .logo-badge {
      display: inline-block; background: var(--accent); color: #0d0d0d;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 99px; margin-bottom: 1.2rem;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 0.75rem;
    }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 1rem; max-width: 420px; margin: 0 auto; line-height: 1.6; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem; width: 100%; max-width: 700px;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    textarea {
      width: 100%; min-height: 150px; resize: vertical;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      line-height: 1.7; padding: 14px 16px; outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .btn {
      margin-top: 1rem; width: 100%; padding: 14px;
      background: var(--accent); color: #0d0d0d; border: none;
      border-radius: 12px; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: 0.02em; transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: var(--accent-dark); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .loader {
      display: none; align-items: center; justify-content: center;
      gap: 8px; padding: 1.2rem 0; color: var(--muted); font-size: 14px;
    }
    .dots { display: flex; gap: 5px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }
    .result {
      display: none; margin-top: 1.5rem; border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; animation: fadeUp 0.4s ease both;
    }
    .verdict-header { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; }
    .verdict-text { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.01em; }
    .confidence-badge {
      font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif;
      padding: 4px 12px; border-radius: 99px; letter-spacing: 0.05em;
    }
    .result-body { padding: 18px 20px; border-top: 1px solid var(--border); background: var(--surface); }
    .section-label {
      font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .summary-text { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 1.2rem; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      font-size: 12px; padding: 5px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    }
    .error-msg { display: none; color: var(--fake); font-size: 13px; padding: 0.8rem 0; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    footer { margin-top: 3rem; color: var(--muted); font-size: 12px; text-align: center; opacity: 0.5; }
  </style>
</head>
<body>
 
<header>
  <div class="logo-badge">VerAi</div>
  <h1>Fake News<br><span>Detector</span></h1>
  <p class="subtitle">Yangilik, tahmin yoki maqola matnini joylashtiring. Sun'iy intellekt uni darhol internetdagi ishonchli rasmiy manbalardan tahlil qiladi.</p>
</header>
 
<div class="card">
  <textarea id="newsInput" placeholder="Yangilik sarlavhasi yoki maqola parchasini shu yerga joylashtiring..."></textarea>
  <div class="error-msg" id="errorMsg"></div>
  <div class="loader" id="loader">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <span>Tahlil qilinmoqda...</span>
  </div>
  <button class="btn" id="analyzeBtn" onclick="analyze()">Yangiliklarni haqiqiy yoki yolg'onligini aniqlash</button>
  <div class="result" id="result">
    <div class="verdict-header" id="verdictHeader">
      <span class="verdict-text" id="verdictText"></span>
      <span class="confidence-badge" id="confidenceBadge"></span>
    </div>
    <div class="result-body">
      <p class="section-label">Tahlil</p>
      <p class="summary-text" id="summaryText"></p>
      <p class="section-label">Aniqlangan signallar</p>
      <div class="chips" id="chipsContainer"></div>
    </div>
  </div>
</div>
 
<footer>By BulderFounders team &mdash; for AI Hackathon &mdash; March 26-27-28</footer>
 
<script>
async function analyze() {
  const text = document.getElementById('newsInput').value.trim();
  const btn = document.getElementById('analyzeBtn');
  const loader = document.getElementById('loader');
  const result = document.getElementById('result');
  const errorMsg = document.getElementById('errorMsg');
 
  errorMsg.style.display = 'none';
  result.style.display = 'none';
 
  if (!text) {
    errorMsg.textContent = 'Iltimos, tahlil qilish uchun matn kiriting.';
    errorMsg.style.display = 'block';
    return;
  }
 
  btn.disabled = true;
  loader.style.display = 'flex';
 
  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
 
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Server xatosi');
    }
 
    const parsed = await res.json();
    render(parsed);
 
  } catch (e) {
    errorMsg.textContent = 'Xato: ' + (e.message || 'Nimadir noto\'g\'ri ketdi.');
    errorMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    loader.style.display = 'none';
  }
}
 
function render(d) {
  const verdictLabels = {
    'LIKELY FAKE': 'SOXTA EHTIMOLI YUQORI',
    'SUSPICIOUS': 'SHUBHALI',
    'LIKELY REAL': 'HAQIQIY EHTIMOLI YUQORI'
  };
  const config = {
    'LIKELY FAKE': { bg:'#2a0f0f', border:'#ff5c5c', textColor:'#ff5c5c', pillBg:'#ff5c5c22', pillText:'#ff5c5c' },
    'SUSPICIOUS':  { bg:'#2a1c0a', border:'#ffb347', textColor:'#ffb347', pillBg:'#ffb34722', pillText:'#ffb347' },
    'LIKELY REAL': { bg:'#0a2a16', border:'#5cffa0', textColor:'#5cffa0', pillBg:'#5cffa022', pillText:'#5cffa0' }
  };
  const c = config[d.verdict] || config['SUSPICIOUS'];
  const header = document.getElementById('verdictHeader');
  header.style.background = c.bg;
  header.style.borderBottom = '1px solid ' + c.border;
  document.getElementById('verdictText').textContent = verdictLabels[d.verdict] || d.verdict;
  document.getElementById('verdictText').style.color = c.textColor;
  const badge = document.getElementById('confidenceBadge');
  badge.textContent = d.confidence + '% ishonch';
  badge.style.background = c.pillBg;
  badge.style.color = c.pillText;
  document.getElementById('summaryText').textContent = d.summary;
  const chips = document.getElementById('chipsContainer');
  chips.innerHTML = (d.signals || []).map(s => `<span class="chip">${s}</span>`).join('');
  const resultEl = document.getElementById('result');
  resultEl.style.borderColor = c.border;
  resultEl.style.display = 'block';
}
 
document.getElementById('newsInput').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') analyze();
});
</script>
</body>
</html>
